<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astrelio</title>
  </head>
  <body>
    <script>
      ;(() => {
        const pathParts = window.location.pathname.split('/').filter(Boolean)
        const projectBase = pathParts[0] === 'astrelio' ? '/astrelio/' : '/'
        const routeParts = projectBase === '/astrelio/' ? pathParts.slice(1) : pathParts
        const route = `/${routeParts.join('/')}`
        const fullRoute = `${route}${window.location.search}${window.location.hash}`

        window.sessionStorage.setItem('astrelio.redirect', fullRoute)
        window.location.replace(projectBase)
      })()
    </script>
  </body>
</html>
